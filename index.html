<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSCI Lagerverwaltung</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <h1>OSCI Lager</h1>
    </header>

    <div id="menu-backdrop" onclick="toggleMenu()"></div>
    <nav id="main-nav" class="nav-links">
        <button id="tab-lager" class="active" onclick="selectTab('lager')">Lager</button>
        <button id="tab-statistik" onclick="selectTab('statistik')">Statistik</button>
        <button id="tab-trace-export" onclick="selectTab('trace-export')">Trace Export</button>
        <button id="tab-log" onclick="selectTab('log')">Logbuch</button>
    </nav>

    <main>
        <section id="lager" class="tab-content active"></section>
        
        <section id="statistik" class="tab-content">
            <h2>Statistiken</h2>
            <div id="stats-start-date" class="hint"></div>
            <div id="stats-container"></div>
            <button class="btn-danger" onclick="resetStatsSingle()">Statistik zurücksetzen</button>
        </section>

        <section id="trace-export" class="tab-content">
            <h2>Trace Mischung</h2>
            <h3>Kationen</h3>
            <div id="kationen-inputs-container"></div>
            <button class="btn-primary" onclick="auslagernMischung('kationen')">Kationen auslagern</button>
            
            <h3 style="margin-top:30px;">Anionen</h3>
            <div id="anionen-inputs-container"></div>
            <button class="btn-primary" onclick="auslagernMischung('anionen')">Anionen auslagern</button>
        </section>

        <section id="log" class="tab-content">
            <h2>Logbuch</h2>
            <div id="log-container"></div>
            <button class="btn-danger" onclick="resetLogsSingle()">Logbuch löschen</button>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Aktion</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Service Worker registriert'))
            .catch(err => console.log('SW Fehler:', err));
        }
    </script>
    
    <script src="app.js"></script>
</body>
</html>
