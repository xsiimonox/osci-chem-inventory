<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSCI Motion Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>OSCI Motion</h1></header>
    <div class="tabs">
        <button onclick="showTab('lager')" class="active" id="tab-lager">Lager</button>
        <button onclick="showTab('cr-import')" id="tab-cr-import">C&R Import</button>
        <button onclick="showTab('mischungen')" id="tab-mischungen">Mischungen</button>
    </div>
    <main id="app">
        <div id="lager" class="tab-content active"></div>
        <div id="cr-import" class="tab-content">
            <div class="card">
                <h3>C&R Liste einfügen</h3>
                <textarea id="cr-paste-area" placeholder="Hier Liste einfügen..."></textarea>
                <button class="btn-primary" onclick="processCRPaste()">Bestand aktualisieren</button>
            </div>
        </div>
        <div id="mischungen" class="tab-content">
            <div class="card">
                <h3>Kationen Mischung</h3>
                <button class="btn-danger" onclick="auslagernMischung('kationen')">Kationen auslagern</button>
            </div>
            <div class="card">
                <h3>Anionen Mischung</h3>
                <button class="btn-danger" onclick="auslagernMischung('anionen')">Anionen auslagern</button>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
